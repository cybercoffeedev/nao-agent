x-common: &common
  USERNAME: dev
  USER_UID: "1000"
  USER_GID: "1000"
  HOME_DIR: /home/dev

services:
  dev:
    build:
      context: .
      target: dev
      args:
        <<: *common
    volumes:
      - .:/home/nao-agent
      - opencode-state:/home/dev/.local/state/opencode
      - opencode-share:/home/dev/.local/share/opencode
    env_file: .env
    stdin_open: true
    tty: true

  production:
    build:
      context: .
      target: production
    env_file: .env
    environment:
      - LOG_DIR=/tmp/logs
      - HOME=/tmp
      - LOCAL_WAV_PATH=/tmp/capture.wav
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /app/logs

volumes:
  opencode-state:
  opencode-share:
