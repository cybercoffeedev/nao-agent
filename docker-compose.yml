services:
  dev:
    build:
      context: .
      target: dev
      args:
        USERNAME: ${USERNAME:-dev}
        USER_UID: "1000"
        USER_GID: "1000"
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace/nao-agent
      - ./.opencode/config:/home/${USERNAME:-dev}/.config/opencode
      - ./.opencode/data:/home/${USERNAME:-dev}/.local/share/opencode

  production:
    build:
      context: .
      target: production
    env_file: .env
    environment:
      - HOME=/tmp
      - LOCAL_WAV_PATH=/tmp/capture.wav
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /app/logs
