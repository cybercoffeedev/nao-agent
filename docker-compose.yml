services:
  dev:
    build:
      context: .
      target: dev
      args:
        USERNAME: ${USERNAME:-dev}
        USER_UID: "1000"
        USER_GID: "1000"
    volumes:
      - .:/workspace/nao-agent
      - ~/.config/opencode:/home/${USERNAME:-dev}/.config/opencode
      - ~/.local/share/opencode:/home/${USERNAME:-dev}/.local/share/opencode
    env_file: .env
    environment:
      - USERNAME=${USERNAME:-dev}
    stdin_open: true
    tty: true

  production:
    build:
      context: .
      target: production
    env_file: .env
    environment:
      - LOG_DIR=/tmp/logs
      - HOME=/tmp
      - LOCAL_WAV_PATH=/tmp/capture.wav
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /app/logs

